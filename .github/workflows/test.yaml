name: Test

on:
  pull_request:  # Run on all branches.
  push:
    branches:
      - master
      - release
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM UTC every day.
  workflow_dispatch:  # Allow manual triggering.

jobs:
  test-plugins:
    name: Test plugins for ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          module-root: plugins
          bazelisk-cache: true
          disk-cache: micromissiles-plugins-${{ runner.os }}
          external-cache: true
          repository-cache: true

      - name: Test plugins
        working-directory: plugins
        run: bazel test --test_output=errors //...

  test-all-modes:
    name: Test in ${{ matrix.testMode }}
    runs-on: ubuntu-latest
    needs: test-plugins
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - editmode
          - playmode
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false # Unity test runner uses Docker.
          swap-storage: false

      - uses: actions/cache@v6
        with:
          path: Library
          key: unity-library-test-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            unity-library-test-${{ matrix.testMode }}-
            unity-library-test-

      - uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          customParameters: -ci
          testMode: ${{ matrix.testMode }}
          artifactsPath: ${{ matrix.testMode }}-artifacts
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: ${{ matrix.testMode }} Test Results
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+bamlab.micromissiles"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-${{ matrix.testMode }}
          path: ${{ steps.tests.outputs.artifactsPath }}

      - name: Upload coverage results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.testMode }}
          path: ${{ steps.tests.outputs.coveragePath }}
