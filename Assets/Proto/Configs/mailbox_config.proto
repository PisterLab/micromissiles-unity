syntax = "proto3";

package configs;

enum MailboxNode {
  MAILBOX_NODE_UNSPECIFIED = 0;
  MAILBOX_NODE_IADS = 1;
  MAILBOX_NODE_CARRIER = 2;
  MAILBOX_NODE_INTERCEPTOR = 3;
}

message MailboxLatencyEntry {
  MailboxNode from = 1;
  MailboxNode to = 2;
  float seconds = 3;
}

message MailboxConfig {
  enum LatencyMode {
    LATENCY_MODE_UNSPECIFIED = 0;
    NO_LATENCY = 1;
    UNIFORM_LATENCY = 2;
    INDIVIDUAL_LATENCY = 3;
  }

  LatencyMode latency_mode = 1;
  float uniform_latency = 2;
  float latency_jitter_std_seconds = 3;
  repeated MailboxLatencyEntry latency_overrides = 4;
}
